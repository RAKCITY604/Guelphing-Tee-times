<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Tee Time Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .controls {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .control-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .control-item label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }
        
        .control-item input,
        .control-item select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn {
            flex: 1;
            min-width: 150px;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .tee-times {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .course-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        
        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .course-name {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .tee-time-list {
            list-style: none;
        }
        
        .tee-time-item {
            padding: 12px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tee-time-item:hover {
            background: #f0f0f5;
            transform: translateX(5px);
        }
        
        .tee-time {
            font-weight: 600;
            color: #667eea;
            font-size: 16px;
        }
        
        .tee-holes {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        
        .no-times {
            text-align: center;
            padding: 40px;
            color: #999;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .message {
            padding: 15px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.active {
            display: block;
        }
        
        .message.info {
            background: #e3f2fd;
            color: #1976d2;
            border-left: 4px solid #1976d2;
        }
        
        .message.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }
        
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }
        
        .club-section {
            margin-bottom: 30px;
        }
        
        .club-title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⛳ Golf Tee Time Finder</h1>
            <p>Find available tee times at Vancouver and Burnaby golf courses</p>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <div class="control-item">
                    <label>Date</label>
                    <input type="date" id="teeDate">
                </div>
                <div class="control-item">
                    <label>Number of Players</label>
                    <select id="players">
                        <option value="1">1 Player</option>
                        <option value="2" selected>2 Players</option>
                        <option value="3">3 Players</option>
                        <option value="4">4 Players</option>
                    </select>
                </div>
                <div class="control-item">
                    <label>Preferred Time</label>
                    <select id="preferredTime">
                        <option value="">Any time</option>
                        <option value="morning">Morning (8am - 12pm)</option>
                        <option value="afternoon">Afternoon (12pm - 5pm)</option>
                        <option value="evening">Evening (5pm - 8pm)</option>
                    </select>
                </div>
            </div>
            
            <div class="button-group">
                <button class="btn btn-primary" id="searchBtn" onclick="searchTeeTime()">Search Tee Times</button>
                <button class="btn btn-secondary" onclick="openLinks()">Open Booking Sites</button>
            </div>
        </div>
        
        <div id="messageContainer"></div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Fetching real tee times from booking sites...</p>
        </div>
        
        <div id="results"></div>
    </div>

    <script>
        const API_BASE_URL = 'https://tee-time-checker-n403.onrender.com';
        
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('teeDate').value = today;
        
        function showMessage(text, type = 'info') {
            const container = document.getElementById('messageContainer');
            container.innerHTML = `<div class="message ${type} active">${text}</div>`;
        }
        
        function openLinks() {
            const date = document.getElementById('teeDate').value;
            const players = document.getElementById('players').value;
            window.open(`https://golfvancouver.cps.golf/?date=${date}&players=${players}`, '_blank');
            window.open(`https://golfburnaby.cps.golf/?date=${date}&players=${players}`, '_blank');
        }
        
        async function searchTeeTime() {
            const date = document.getElementById('teeDate').value;
            const players = document.getElementById('players').value;
            const preferredTime = document.getElementById('preferredTime').value;
            const searchBtn = document.getElementById('searchBtn');
            
            if (!date) {
                showMessage('Please select a date', 'error');
                return;
            }
            
            searchBtn.disabled = true;
            document.getElementById('loading').classList.add('active');
            document.getElementById('results').innerHTML = '';
            document.getElementById('messageContainer').innerHTML = '';
            
            try {
                const vancouverData = await fetchCourseData('vancouver', date, players);
                const burnabData = await fetchCourseData('burnaby', date, players);
                
                const allCourses = [...vancouverData, ...burnabData];
                displayResults(allCourses, date, players, preferredTime);
                
            } catch (error) {
                showMessage(`Error fetching tee times: ${error.message}. Try opening the booking sites directly.`, 'error');
                console.error(error);
            } finally {
                document.getElementById('loading').classList.remove('active');
                searchBtn.disabled = false;
            }
        }
        
        async function fetchCourseData(club, date, players) {
            const params = new URLSearchParams({ date, players, club });
            const response = await fetch(`${API_BASE_URL}/api/tee-times?${params}`);
            
            if (!response.ok) {
                throw new Error(`Failed to fetch ${club} courses`);
            }
            
            return await response.json();
        }
        
        function displayResults(courseData, date, players, preferredTime) {
            const resultsDiv = document.getElementById('results');
            
            if (!courseData || courseData.length === 0) {
                resultsDiv.innerHTML = '<div class="no-times">No courses found</div>';
                return;
            }
            
            // Group by club
            const grouped = {};
            courseData.forEach(course => {
                if (!grouped[course.club]) {
                    grouped[course.club] = [];
                }
                grouped[course.club].push(course);
            });
            
            let html = '';
            let totalTimes = 0;
            
            // Vancouver first, then Burnaby
            const clubOrder = ['Vancouver Golf Club', 'Burnaby Golf Club'];
            
            clubOrder.forEach(clubName => {
                if (!grouped[clubName]) return;
                
                html += `
                    <div class="club-section">
                        <div class="club-title">${clubName}</div>
                        <div class="tee-times">
                `;
                
                grouped[clubName].forEach(course => {
                    const times = course.times || [];
                    totalTimes += times.length;
                    
                    let filteredTimes = times;
                    if (preferredTime) {
                        filteredTimes = times.filter(t => filterByTimePreference(t.time, preferredTime));
                    }
                    
                    if (filteredTimes.length === 0) {
                        filteredTimes = times.slice(0, 5);
                    }
                    
                    html += `
                        <div class="course-card">
                            <div class="course-name">${course.name}</div>
                            <ul class="tee-time-list">
                    `;
                    
                    if (filteredTimes.length === 0) {
                        html += `<li style="padding: 12px; color: #999;">No tee times available</li>`;
                    } else {
                        filteredTimes.forEach(slot => {
                            html += `
                                <li class="tee-time-item" onclick="bookTee('${course.name}', '${slot.time}', '${course.url}')">
                                    <div class="tee-time">${slot.time}</div>
                                    <div class="tee-holes">${slot.holes} holes available</div>
                                </li>
                            `;
                        });
                    }
                    
                    html += `
                            </ul>
                            <button class="btn btn-secondary" style="width: 100%; margin-top: 15px;" onclick="openCourse('${course.url}')">
                                View All Times →
                            </button>
                        </div>
                    `;
                });
                
                html += `
                        </div>
                    </div>
                `;
            });
            
            resultsDiv.innerHTML = html;
            
            if (totalTimes === 0) {
                showMessage('No tee times available for this date. Try a different date or click "Open Booking Sites" to check directly.', 'info');
            } else {
                showMessage(`Found ${totalTimes} tee times available for ${players} player(s) on ${new Date(date).toLocaleDateString()}`, 'success');
            }
        }
        
        function filterByTimePreference(time, preference) {
            const [timeStr, period] = time.split(' ');
            const [hours, mins] = timeStr.split(':').map(Number);
            const hour24 = period === 'PM' && hours !== 12 ? hours + 12 : (period === 'AM' && hours === 12 ? 0 : hours);
            
            switch(preference) {
                case 'morning':
                    return hour24 >= 8 && hour24 < 12;
                case 'afternoon':
                    return hour24 >= 12 && hour24 < 17;
                case 'evening':
                    return hour24 >= 17 && hour24 < 20;
                default:
                    return true;
            }
        }
        
        function bookTee(course, time, url) {
            window.open(url, '_blank');
        }
        
        function openCourse(url) {
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
